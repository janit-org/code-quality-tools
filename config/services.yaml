services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Make all classes in the bundle available as services
    Janit\CodeQualityBundle\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/JanitCodeQualityBundle.php'

    # Configuration Resolver
    Janit\CodeQualityBundle\Configuration\ConfigurationResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $bundleConfigDir: '%janit_code_quality.config_dir%'

    # Tool Runners
    Janit\CodeQualityBundle\Runner\PhpstanRunner:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: 'janit_code_quality.tool_runner' }

    Janit\CodeQualityBundle\Runner\PhpcsRunner:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: 'janit_code_quality.tool_runner' }

    # Tool Runner Registry
    Janit\CodeQualityBundle\Runner\ToolRunnerRegistry:
        arguments:
            $runners: !tagged_iterator 'janit_code_quality.tool_runner'

    # Hook Installer
    Janit\CodeQualityBundle\Hook\HookInstaller:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $templateDir: '%janit_code_quality.config_dir%/../src/Hook/templates'

    # Commands are auto-registered via autoconfigure
